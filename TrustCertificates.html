// Change Language Function

document.getElementById('header-title').textContent = data.headerTitle;

const servicesWrapper = document.getElementById('services-wrapper');
servicesWrapper.innerHTML='';
data.services.forEach((s,i)=>{
    const slide = document.createElement('div');
    slide.classList.add('swiper-slide');
    slide.innerHTML = `<img class="slide-img" src="https://picsum.photos/600/400?${i+1}">
    <div class="slide-content"><h3>${s.title}</h3><p>${s.desc}</p></div>`;
    servicesWrapper.appendChild(slide);
});

// Countries
document.getElementById('country-title').textContent = data.countryTitle;
const countryWrapper = document.getElementById('country-wrapper');
countryWrapper.innerHTML='';
const codes = ['ir','sa','ae','gb','us','qa'];
data.countries.forEach((c,i)=>{
    const slide = document.createElement('div');
    slide.classList.add('swiper-slide');
    slide.innerHTML = `<img class="slide-img" src="https://flagcdn.com/${codes[i]}.svg" alt="${c}"><div class="slide-content"><h3>${c}</h3></div>`;
    countryWrapper.appendChild(slide);
});

// Documents
document.getElementById('documents-title').textContent = data.documentsTitle;
const documentsWrapper = document.getElementById('documents-wrapper');
documentsWrapper.innerHTML='';
data.documents.forEach((img)=>{
    const slide = document.createElement('div');
    slide.classList.add('swiper-slide');
    slide.innerHTML = `<img class="slide-img" src="${img}" alt="Document">`;
    documentsWrapper.appendChild(slide);
});

// Contact & About
document.getElementById('contact-title').textContent = data.contactTitle;
document.getElementById('contact-desc').textContent = data.contactDesc;
document.getElementById('contact-whatsapp').textContent = data.contactWhatsApp;
document.getElementById('about-title').textContent = data.aboutTitle;
document.getElementById('about-desc').innerHTML = data.aboutDesc.replace(/\n/g,'<br>');
document.getElementById('footer-text').textContent = data.footer;

// Reinitialize Swipers after DOM changes
if(swiper) swiper.destroy(true,true);
if(countrySwiper) countrySwiper.destroy(true,true);
if(documentsSwiper) documentsSwiper.destroy(true,true);
initSwipers();
}
